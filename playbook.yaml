---

#######
#Executer avec la commande : ansible-playbook playbook.yaml -i inventory.ini -k -K
# -k = mot de passe session ssh 
# -K = mot de passe "become_user" pour  "su"
#######

- name: Durcissement Debian 13
  hosts: servers
  become: true
  become_method: su
  become_user: root
  become_flags: '-'

  tasks:

  - name: Install Sudo
    ansible.builtin.apt:
      name: sudo


  - name: Update and upgrade apt packages
    apt:
      upgrade: yes
      update_cache: yes

  - name: Disable Root Login
    lineinfile:
           dest: /etc/ssh/sshd_config
           regexp: '^#PermitRootLogin'
           line: "PermitRootLogin no"

  - name: Copy ssh key
    ansible.posix.authorized_key:
      user: benjamin
      key: "{{ lookup('file', '/home/benjamin/.ssh/id_ed25519.pub') }}"

  - name: Disable SSH Psswd Login
    lineinfile:
           dest: /etc/ssh/sshd_config
           regexp: '^#PasswordAuthentication'
           line: "PasswordAuthentication no"

  - name: Install UFW
    ansible.builtin.apt:
      name: ufw

  - name: UFW config open port
    community.general.ufw:
      rule: allow
      name: OpenSSH

  - name: UFW deny all incoming traffic
    community.general.ufw:
      direction: incoming
      default: deny

  - name: Installer Fail2Ban
    ansible.builtin.apt:
      name: fail2ban

  - name: Config Fail2Ban
    ansible.builtin.copy:
      content: |
        [DEFAULT]
        bantime = 3600
        findtime = 600
        maxretry = 15
      dest: /etc/fail2ban/jail.local
      owner: root
      group: root
      mode: '0644'

  - name: Install unattended-upgrades package
    ansible.builtin.apt:
      name:
        - unattended-upgrades

  - name: Enable unattended-upgrades
    ansible.builtin.debconf:
      name: unattended-upgrades
      question: unattended-upgrades/enable_auto_updates
      value: "true"
      vtype: boolean

  - name: Reboot Host
    ansible.builtin.reboot:
